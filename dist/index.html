<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PandaTech — המוצרים שלנו</title>
<meta name="robots" content="noindex" />
<style>
  :root { --bg:#0b0f1a; --card:rgba(255,255,255,.04); --brd:rgba(255,255,255,.09); --txt:#e7ecf5; --muted:#93a1b8; }
  * { box-sizing:border-box; } html,body{margin:0;padding:0;}
  body { font-family: system-ui,-apple-system,"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .wrap { max-width:820px; width:100%; }
  h1 { font-size:32px; font-weight:900; margin:0 0 6px; letter-spacing:-1px; }
  p.sub { color:var(--muted); margin:0 0 28px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  a.card { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--txt); background:var(--card); border:1px solid var(--brd); border-radius:16px; padding:18px 20px; transition:transform .15s, border-color .15s; }
  a.card:hover { transform:translateY(-3px); border-color:rgba(124,92,255,.5); }
  a.card .em { font-size:26px; }
  a.card b { display:block; font-size:17px; }
  a.card span { color:var(--muted); font-size:13px; }
  footer { color:var(--muted); font-size:13px; margin-top:26px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>המוצרים של PandaTech</h1>
  <p class="sub">בחרו מוצר כדי לצפות בדף הנחיתה שלו.</p>
  <div class="grid">
    <a class="card" href="pandoosh/"><span class="em">🐼</span><span><b>Pandoosh</b><span>קונסיירז' HR בוואטסאפ</span></span></a>
    <a class="card" href="argus/"><span class="em">🛡️</span><span><b>Argus</b><span>ניתוח סטטי · IEC 60880</span></span></a>
    <a class="card" href="pandavista/"><span class="em">🌐</span><span><b>PandaVista</b><span>תוכן · SEO · GEO</span></span></a>
    <a class="card" href="personal-assistant/"><span class="em">🌅</span><span><b>העוזר האישי</b><span>הכנה יומית ושבועית</span></span></a>
    <a class="card" href="weavz/"><span class="em">🧭</span><span><b>Weavz</b><span>ניווט בחיים</span></span></a>
  </div>
  <footer>© PandaTech</footer>
</div>
</body>
</html>
